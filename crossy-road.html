<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Crossy Clone 3D</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#a3d9ff;
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;}
  #game{display:block;width:100%;height:100%;touch-action:none;}
  #hud{position:fixed;top:14px;left:0;right:0;text-align:center;pointer-events:none;z-index:5;}
  #score{font-size:46px;font-weight:800;color:#fff;text-shadow:0 3px 0 rgba(0,0,0,.3);letter-spacing:1px;}
  #best{font-size:15px;color:#fff;opacity:.9;text-shadow:0 2px 0 rgba(0,0,0,.25);margin-top:2px;}
  #overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(20,40,60,.55);color:#fff;z-index:10;text-align:center;padding:20px;backdrop-filter:blur(2px);}
  #overlay h1{font-size:44px;margin-bottom:6px;text-shadow:0 4px 0 rgba(0,0,0,.35);}
  #overlay p{font-size:17px;opacity:.92;margin-bottom:26px;line-height:1.5;max-width:340px;}
  .btn{background:#ffcf2e;color:#3a2e00;border:none;border-radius:14px;padding:14px 36px;font-size:21px;
    font-weight:800;cursor:pointer;box-shadow:0 5px 0 #c79b00;transition:transform .05s, box-shadow .05s;}
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 #c79b00;}
  .hidden{display:none!important;}
  #final{font-size:22px;margin-bottom:18px;}
  #hint{position:fixed;bottom:16px;left:0;right:0;text-align:center;color:#fff;opacity:.75;
    font-size:13px;pointer-events:none;text-shadow:0 1px 2px rgba(0,0,0,.4);}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:20px;background:#a3d9ff;z-index:20;}
  #coinhud{position:fixed;top:16px;right:18px;z-index:5;pointer-events:none;
    font-size:26px;font-weight:800;color:#ffd33a;text-shadow:0 2px 0 rgba(0,0,0,.3);}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div id="score">0</div>
  <div id="best">Best: 0</div>
</div>
<div id="coinhud">🟡 <span id="coins">0</span></div>

<div id="overlay" class="hidden">
  <h1>🐔 Crossy Clone</h1>
  <p>Bring das Hühnchen so weit wie möglich nach vorne.<br>
     Weiche Autos &amp; Zügen aus, hüpf auf Baumstämme über das Wasser.</p>
  <div id="final" class="hidden"></div>
  <button class="btn" id="startBtn">Start</button>
</div>

<div id="hint">↑ ↓ ← →  oder  WASD  ·  Wischen / Tippen auf Mobil</div>
<div id="loading">Lade…</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const TILE   = 42;          // world units per grid tile
const COLS   = 13;          // playable columns (odd -> has center)
const HALF   = Math.floor(COLS/2);   // -HALF .. +HALF
const SPAN   = COLS + 10;   // wrap span for traffic (tiles)
const BOARDW = (COLS + 8) * TILE;    // ground strip width

const scoreEl = document.getElementById('score');
const bestEl  = document.getElementById('best');
const overlay = document.getElementById('overlay');
const startBtn= document.getElementById('startBtn');
const finalEl = document.getElementById('final');
const loadingEl = document.getElementById('loading');
const coinsEl = document.getElementById('coins');

let renderer, scene, camera, dirLight;
let lanes = {};             // row -> lane
let player, score, best, furthest, running, gameOver, lastTime, coins;

best = parseInt(localStorage.getItem('crossy3dBest') || '0', 10);
bestEl.textContent = 'Best: ' + best;

// ---------- colors ----------
const C = {
  grassA:0x7ec64a, grassB:0x71ba3e,
  road:0x3f434c, shoulder:0xd6a55f, shoulderB:0xcf9a52, dash:0xf2f2f2,
  water:0x49c3ee, waterDeep:0x3aa9d8,
  rail:0xb9b2a8, tie:0x6f5d49, steel:0xd8d8de,
  treeTrunk:0x7a5630, treeTop:0x49ab3c, treeTop2:0x3f9c34,
  cactus:0x4f9e4b,
  rock:0x9aa0a6,
  log:0x5a3a20, logHi:0x744a28,
  chicken:0xffffff, comb:0xe2483b, beak:0xf6a623, leg:0xf6a623,
  train:0x3a86c8, trainTrim:0xf2c14e, trainWin:0xe9f2fb,
  coin:0xf7c948, coinC:0xd0331f,
};

// ---------- three setup ----------
function buildRenderer(){
  const canvas = document.getElementById('game');
  renderer = new THREE.WebGLRenderer({canvas, antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xa3d9ff);
  scene.fog = new THREE.Fog(0xa3d9ff, 1400, 2200);

  // lights
  const amb = new THREE.AmbientLight(0xffffff, 0.75);
  scene.add(amb);
  const hemi = new THREE.HemisphereLight(0xffffff, 0x88aa66, 0.35);
  scene.add(hemi);

  dirLight = new THREE.DirectionalLight(0xffffff, 0.65);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(2048,2048);
  const s = 500;
  dirLight.shadow.camera.left=-s; dirLight.shadow.camera.right=s;
  dirLight.shadow.camera.top=s;   dirLight.shadow.camera.bottom=-s;
  dirLight.shadow.camera.near=100; dirLight.shadow.camera.far=900;
  dirLight.shadow.bias = -0.0008;
  scene.add(dirLight);
  scene.add(dirLight.target);

  makeCamera();
  window.addEventListener('resize', onResize);
}

function makeCamera(){
  const w = window.innerWidth, h = window.innerHeight;
  const viewW = BOARDW * 0.62;                 // horizontal frustum (world units)
  const viewH = viewW * h / w;
  camera = new THREE.OrthographicCamera(viewW/-2, viewW/2, viewH/2, viewH/-2, 50, 2200);
  camera.up.set(0,0,1);
}

function onResize(){
  renderer.setSize(window.innerWidth, window.innerHeight);
  const w = window.innerWidth, h = window.innerHeight;
  const viewW = BOARDW * 0.62;
  const viewH = viewW * h / w;
  camera.left=viewW/-2; camera.right=viewW/2; camera.top=viewH/2; camera.bottom=viewH/-2;
  camera.updateProjectionMatrix();
}

// ---------- mesh helpers ----------
function box(sx,sy,sz,color){
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(sx,sy,sz),
    new THREE.MeshLambertMaterial({color})
  );
  m.castShadow = true; m.receiveShadow = true;
  return m;
}
function rnd(a,b){ return a+Math.random()*(b-a); }
function randint(a,b){ return Math.floor(rnd(a,b+1)); }
function choice(a){ return a[randint(0,a.length-1)]; }

// ---------- models ----------
const CAR_COLORS=[0xe84d4d,0x4d8ce8,0xffce47,0x9b59b6,0xff8c42,0x1abc9c,0xec4899,0xffffff,0x34495e];

function makeChicken(){
  const g = new THREE.Group();
  // legs
  const l1 = box(TILE*0.10, TILE*0.10, TILE*0.18, C.leg); l1.position.set(-TILE*0.12,0,TILE*0.09);
  const l2 = box(TILE*0.10, TILE*0.10, TILE*0.18, C.leg); l2.position.set( TILE*0.12,0,TILE*0.09);
  g.add(l1,l2);
  // body
  const body = box(TILE*0.42, TILE*0.42, TILE*0.34, C.chicken);
  body.position.set(0,0,TILE*0.18+TILE*0.17);
  g.add(body);
  // head
  const head = box(TILE*0.30, TILE*0.30, TILE*0.28, C.chicken);
  head.position.set(0, TILE*0.04, TILE*0.18+TILE*0.34+TILE*0.10);
  g.add(head);
  // tail
  const tail = box(TILE*0.12, TILE*0.16, TILE*0.20, C.chicken);
  tail.position.set(0,-TILE*0.24, TILE*0.40);
  g.add(tail);
  // comb (red) on top of head
  const comb = box(TILE*0.10, TILE*0.22, TILE*0.10, C.comb);
  comb.position.set(0, TILE*0.02, TILE*0.18+TILE*0.34+TILE*0.28);
  g.add(comb);
  // beak (points +y = forward)
  const beak = box(TILE*0.10, TILE*0.14, TILE*0.08, C.beak);
  beak.position.set(0, TILE*0.18, TILE*0.18+TILE*0.34+TILE*0.06);
  g.add(beak);
  // eyes
  const eMat = new THREE.MeshLambertMaterial({color:0x222222});
  for(const sx of [-1,1]){
    const eye = new THREE.Mesh(new THREE.BoxGeometry(TILE*0.05,TILE*0.04,TILE*0.06), eMat);
    eye.position.set(sx*TILE*0.09, TILE*0.16, TILE*0.18+TILE*0.34+TILE*0.16);
    g.add(eye);
  }
  return g;
}

function makeCar(color, truck){
  // Crossy-Road style: colored lower body + white cabin/roof, black window band.
  const g = new THREE.Group();
  const len = truck ? TILE*1.7 : TILE*0.96;   // along X (travel axis)
  const depth = TILE*0.66;
  const baseZ = TILE*0.14;                     // sit just above road
  if(truck){
    // colored chassis + big white box (delivery van look)
    const chassis = box(len, depth, TILE*0.22, color);
    chassis.position.z = baseZ + TILE*0.11; g.add(chassis);
    const cargo = box(len*0.78, depth*0.98, TILE*0.5, 0xffffff);
    cargo.position.set(-len*0.08, 0, baseZ+TILE*0.22+TILE*0.25); g.add(cargo);
    const nose = box(len*0.2, depth*0.96, TILE*0.34, color);
    nose.position.set(len*0.4, 0, baseZ+TILE*0.22+TILE*0.17); g.add(nose);
    const win = box(len*0.2+1, depth*0.7, TILE*0.16, 0x1c2230);
    win.position.set(len*0.4, 0, baseZ+TILE*0.22+TILE*0.22); g.add(win);
  } else {
    const bodyH = TILE*0.28;
    const body = box(len, depth, bodyH, color);
    body.position.z = baseZ + bodyH/2; g.add(body);
    // white roof / cabin
    const roof = box(len*0.6, depth*0.94, TILE*0.24, 0xffffff);
    roof.position.set(0, 0, baseZ+bodyH+TILE*0.12); g.add(roof);
    // black window band wrapping the cabin
    const win = box(len*0.6+1, depth*0.98, TILE*0.13, 0x1c2230);
    win.position.set(0, 0, baseZ+bodyH+TILE*0.07); g.add(win);
  }
  // wheels (small, dark, peeking under body)
  for(const sx of [-1,1]) for(const sy of [-1,1]){
    const w = box(TILE*0.20, TILE*0.13, TILE*0.16, 0x1b1b1b);
    w.position.set(sx*len*0.33, sy*depth*0.46, baseZ-TILE*0.02);
    g.add(w);
  }
  // headlights at +X (front) end
  for(const sy of [-1,1]){
    const hl = box(TILE*0.05, TILE*0.10, TILE*0.08, 0xfff3b0);
    hl.position.set(len/2, sy*depth*0.3, baseZ+TILE*0.14);
    g.add(hl);
  }
  return g;
}

function lighten(hex, amt){
  const c = new THREE.Color(hex);
  c.r = Math.min(1, c.r + amt); c.g = Math.min(1, c.g + amt); c.b = Math.min(1, c.b + amt);
  return c.getHex();
}

function makeLog(len){
  // blocky rectangular log (Crossy-Road style), floating low in the water
  const g = new THREE.Group();
  const L = len*TILE*0.97, w = TILE*0.78, h = TILE*0.34;
  const z = TILE*0.06;
  const main = box(L, w, h, C.log);
  main.position.z = z; g.add(main);
  // lighter pixel highlights along the top
  const stripes = Math.round(len*2);
  for(let i=0;i<stripes;i++){
    const s = box(L*0.9/stripes*0.7, w*0.7, TILE*0.04, C.logHi);
    s.position.set(-L*0.45 + (i+0.5)*L*0.9/stripes, rnd(-w*0.12,w*0.12), z+h/2);
    g.add(s);
  }
  // darker end caps
  for(const sx of [-1,1]){
    const cap = box(TILE*0.06, w*1.02, h*1.02, 0x432a16);
    cap.position.set(sx*L/2, 0, z); g.add(cap);
  }
  return g;
}

function makeTrain(len){
  // blue passenger train with windows + yellow trim
  const g = new THREE.Group();
  const L = len*TILE;
  const body = box(L, TILE*0.78, TILE*0.6, C.train);
  body.position.z = TILE*0.14 + TILE*0.3;
  g.add(body);
  const roof = box(L*0.98, TILE*0.72, TILE*0.14, 0x2f6ea8);
  roof.position.z = TILE*0.14 + TILE*0.6 + TILE*0.05;
  g.add(roof);
  // yellow trim stripe along the sides
  for(const sy of [-1,1]){
    const trim = box(L*0.99, TILE*0.05, TILE*0.08, C.trainTrim);
    trim.position.set(0, sy*TILE*0.4, TILE*0.14+TILE*0.18);
    g.add(trim);
  }
  // window band
  const n = Math.floor(len*1.6);
  for(let i=0;i<n;i++){
    const win = box((L*0.86)/n*0.7, TILE*0.82, TILE*0.24, C.trainWin);
    win.position.set(-L*0.43 + (i+0.5)*(L*0.86)/n, 0, TILE*0.14+TILE*0.38);
    g.add(win);
  }
  return g;
}

function makeTree(){
  // stacked green cubes on a short brown trunk
  const g = new THREE.Group();
  const trunk = box(TILE*0.22, TILE*0.22, TILE*0.28, C.treeTrunk);
  trunk.position.z = TILE*0.14;
  g.add(trunk);
  const layers = randint(1,3);
  let z = TILE*0.28, size = TILE*0.62;
  for(let i=0;i<layers;i++){
    const cube = box(size, size, TILE*0.5, i%2 ? C.treeTop2 : C.treeTop);
    cube.position.z = z + TILE*0.25;
    g.add(cube);
    z += TILE*0.42; size *= 0.84;
  }
  return g;
}

function makeCactus(){
  const g = new THREE.Group();
  const stem = box(TILE*0.24, TILE*0.24, TILE*0.8, C.cactus);
  stem.position.z = TILE*0.4; g.add(stem);
  for(const sx of [-1,1]){
    const arm = box(TILE*0.32, TILE*0.16, TILE*0.16, C.cactus);
    arm.position.set(sx*TILE*0.2, 0, TILE*0.45); g.add(arm);
    const up = box(TILE*0.16, TILE*0.16, TILE*0.26, C.cactus);
    up.position.set(sx*TILE*0.32, 0, TILE*0.58); g.add(up);
  }
  return g;
}

function makeRock(){
  const r = box(TILE*0.42, TILE*0.42, TILE*0.32, C.rock);
  r.position.z = TILE*0.16;
  return r;
}

function makeCoin(){
  // yellow block with a red "C", spins around its vertical axis
  const g = new THREE.Group();
  const body = box(TILE*0.4, TILE*0.4, TILE*0.14, C.coin);
  body.position.z = TILE*0.28; g.add(body);
  // red C: three little bars forming an open square
  const cMat = C.coinC;
  const bars = [
    [0, TILE*0.11, TILE*0.22, TILE*0.05],   // top
    [0,-TILE*0.11, TILE*0.22, TILE*0.05],   // bottom
    [-TILE*0.09, 0, TILE*0.05, TILE*0.22],  // left
  ];
  for(const [bx,bz,bw,bh] of bars){
    const bar = box(bw, TILE*0.02, bh, cMat);
    bar.position.set(bx, TILE*0.21, TILE*0.28+bz);
    g.add(bar);
  }
  g.userData.spin = true;
  return g;
}

// ---------- lane backgrounds ----------
const SLAB = TILE*0.55;           // ground slab thickness (chunky sides visible)
function groundStrip(color){
  const m = box(BOARDW, TILE, SLAB, color);
  m.position.z = -SLAB/2;         // top surface at z = 0
  m.castShadow = false;
  return m;
}

// ---------- lane generation ----------
const LANE={GRASS:'grass',ROAD:'road',WATER:'water',RAIL:'rail'};

function makeLane(row){
  const g = new THREE.Group();
  g.position.y = row*TILE;
  let lane = { row, group:g, items:[], type:LANE.GRASS };

  if(row <= 4){                    // safe start area: grass, no obstacles near center
    lane.type = LANE.GRASS;
    g.add(groundStrip(row%2? C.grassA : C.grassB));
    addTrees(lane, row<=1 ? 0 : randint(0,2), true);
    scene.add(g);
    return lane;
  }

  const diff = Math.min(1, (row-4)/110);
  const r = Math.random();
  let type;
  const prev = lanes[row-1];
  // avoid 3+ consecutive water (unfair)
  const waterStreak = (prev&&prev.type===LANE.WATER) && (lanes[row-2]&&lanes[row-2].type===LANE.WATER);
  if(r<0.34) type=LANE.ROAD;
  else if(r<0.56 && !waterStreak) type=LANE.WATER;
  else if(r<0.70) type=LANE.RAIL;
  else type=LANE.GRASS;

  if(type===LANE.GRASS){
    lane.type=LANE.GRASS;
    g.add(groundStrip(row%2? C.grassA : C.grassB));
    addTrees(lane, randint(0,3), false);
    addCoins(lane);
  }
  else if(type===LANE.ROAD){
    lane.type=LANE.ROAD;
    g.add(groundStrip(C.shoulder));                          // tan slab -> shoulders show
    const asph = box(BOARDW, TILE*0.84, TILE*0.06, C.road);  // dark asphalt surface
    asph.position.z = TILE*0.03; g.add(asph);
    // dashed center line
    for(let c=-HALF-3;c<=HALF+3;c++){
      const dash = box(TILE*0.42, TILE*0.07, TILE*0.02, C.dash);
      dash.position.set(c*TILE, 0, TILE*0.07); g.add(dash);
    }
    lane.speed = rnd(2.2, 3.4+diff*3.0) * (Math.random()<0.5?-1:1);
    const truck = Math.random()<0.22;
    spawnTraffic(lane, truck, rnd(2.6,3.8 - diff*0.7));
    addCoins(lane);
  }
  else if(type===LANE.WATER){
    lane.type=LANE.WATER;
    const strip = box(BOARDW, TILE, SLAB, C.water);
    strip.position.z = -SLAB/2 - TILE*0.12;                  // recessed channel
    g.add(strip);
    lane.speed = rnd(1.4, 2.4+diff*1.2) * (Math.random()<0.5?-1:1);
    spawnLogs(lane, rnd(2.0,3.0));
  }
  else { // rail
    lane.type=LANE.RAIL;
    g.add(groundStrip(C.rail));
    // ties
    for(let c=-HALF-2;c<=HALF+2;c++){
      const tie = box(TILE*0.22, TILE*0.9, TILE*0.12, C.tie);
      tie.position.set(c*TILE, 0, TILE*0.06); g.add(tie);
    }
    for(const sy of [-0.28,0.28]){
      const railM = box(BOARDW, TILE*0.06, TILE*0.1, C.steel);
      railM.position.set(0, sy*TILE, TILE*0.12); g.add(railM);
    }
    // signal posts on the edges
    for(const sx of [-1,1]){
      const post = box(TILE*0.1,TILE*0.1,TILE*0.7,0x444444);
      post.position.set(sx*(HALF+1)*TILE,0,TILE*0.35); g.add(post);
      const lamp = box(TILE*0.18,TILE*0.18,TILE*0.18,0x550000);
      lamp.position.set(sx*(HALF+1)*TILE,0,TILE*0.72);
      lane._lamps = lane._lamps||[]; lane._lamps.push(lamp); g.add(lamp);
    }
    lane.dir = Math.random()<0.5?-1:1;
    lane.timer = rnd(2,5);
    lane.speed = rnd(16,22);
    lane.train = null; lane.warn=0;
  }
  scene.add(g);
  return lane;
}

function addTrees(lane, count, safe){
  const used=new Set([0]);             // keep center clear-ish
  for(let i=0;i<count;i++){
    let c = randint(-HALF,HALF);
    if(used.has(c)) continue;
    used.add(c);
    const r = Math.random();
    const m = r<0.66 ? makeTree() : r<0.85 ? makeCactus() : makeRock();
    m.position.x = c*TILE;
    lane.group.add(m);
    lane.items.push({x:c, solid:true});
  }
}

function addCoins(lane){
  if(lane.row<=2 || Math.random()>0.32) return;
  let c = randint(-HALF,HALF);
  if(lane.items.some(t=>t.solid && t.x===c)) return;
  const mesh = makeCoin();
  mesh.position.set(c*TILE, 0, 0);
  lane.group.add(mesh);
  lane.coins = lane.coins || [];
  lane.coins.push({x:c, mesh, taken:false});
}

function spawnTraffic(lane, truck, gap){
  const len = truck?1.6:0.92;
  let x = -HALF-3;
  while(x < HALF+4){
    const color = choice(CAR_COLORS);
    const mesh = makeCar(color, truck);
    mesh.position.y = 0;
    if(lane.speed<0) mesh.rotation.z = Math.PI;   // face travel dir
    lane.group.add(mesh);
    lane.items.push({x, len, mesh, kind:'car'});
    x += len + gap + rnd(0,0.8);
  }
}

function spawnLogs(lane, gap){
  let x=-HALF-3;
  while(x<HALF+4){
    const len = randint(2,3);
    const mesh = makeLog(len);
    lane.group.add(mesh);
    lane.items.push({x, len, mesh, kind:'log'});
    x += len + gap + rnd(0,1);
  }
}

function getLane(row){
  if(!lanes[row]) lanes[row]=makeLane(row);
  return lanes[row];
}

function ensureLanes(){
  const r0 = Math.round(player.row);
  for(let r=r0-6; r<=r0+22; r++) getLane(r);
  // cull far behind
  for(const k in lanes){
    if(+k < r0-10){
      scene.remove(lanes[k].group);
      disposeGroup(lanes[k].group);
      delete lanes[k];
    }
  }
}
function disposeGroup(g){
  g.traverse(o=>{ if(o.geometry)o.geometry.dispose(); if(o.material)o.material.dispose(); });
}

// ---------- player ----------
function resetGame(){
  for(const k in lanes){ scene.remove(lanes[k].group); disposeGroup(lanes[k].group); }
  lanes={};
  if(player&&player.mesh) scene.remove(player.mesh);

  player = {
    col:0, row:0,
    x:0, y:0,                 // smooth render (tile units)
    fromCol:0, fromRow:0, tCol:0, tRow:0,
    moving:false, hopT:0, dir:'up',
    onLog:null, dead:false, mesh: makeChicken()
  };
  scene.add(player.mesh);
  placePlayer();

  score=0; furthest=0; coins=0; gameOver=false; running=true;
  scoreEl.textContent='0';
  coinsEl.textContent='0';
  ensureLanes();
}

function placePlayer(){
  player.mesh.position.set(player.x*TILE, player.y*TILE, 0);
  player.mesh.rotation.z = dirAngle(player.dir);
}
function dirAngle(d){
  return d==='up'?0 : d==='down'?Math.PI : d==='left'?Math.PI/2 : -Math.PI/2;
}

function tryMove(dr,dc){
  if(!running||player.moving||gameOver) return;
  const nr=player.row+dr, nc=player.col+dc;
  if(nc<-HALF||nc>HALF) return;          // side bounds
  if(nr<player.row && nr<0) return;      // small backward allowed but not past start much
  if(nr < -3) return;

  if(dr>0) player.dir='up';              // forward = +row
  else if(dr<0) player.dir='down';
  else if(dc<0) player.dir='left';
  else player.dir='right';

  const lane=getLane(nr);
  if(lane.type===LANE.GRASS && lane.items.some(t=>t.solid && t.x===nc)){
    // blocked by tree/rock: just turn to face it
    player.mesh.rotation.z = dirAngle(player.dir);
    return;
  }

  player.fromCol=player.x; player.fromRow=player.y;
  player.tCol=nc; player.tRow=nr;
  player.col=nc; player.row=nr;
  player.moving=true; player.hopT=0;
  player.onLog=null;
}

// ---------- input ----------
window.addEventListener('keydown', e=>{
  const k=e.key.toLowerCase();
  if(['arrowup','w'].includes(k)){ tryMove(1,0); e.preventDefault(); }
  else if(['arrowdown','s'].includes(k)){ tryMove(-1,0); e.preventDefault(); }
  else if(['arrowleft','a'].includes(k)){ tryMove(0,-1); e.preventDefault(); }
  else if(['arrowright','d'].includes(k)){ tryMove(0,1); e.preventDefault(); }
});
let tStart=null;
const canvasEl=document.getElementById('game');
canvasEl.addEventListener('touchstart',e=>{ tStart={x:e.touches[0].clientX,y:e.touches[0].clientY}; },{passive:true});
canvasEl.addEventListener('touchend',e=>{
  if(!tStart) return;
  const dx=e.changedTouches[0].clientX-tStart.x, dy=e.changedTouches[0].clientY-tStart.y;
  const ad=Math.abs(dx), ay=Math.abs(dy);
  if(ad<24&&ay<24) tryMove(1,0);
  else if(ay>ad) tryMove(dy<0?1:-1,0);
  else tryMove(0,dx<0?-1:1);
  tStart=null;
});
canvasEl.addEventListener('click',()=>{ if('ontouchstart'in window) return; tryMove(1,0); });

// ---------- update ----------
function update(dt){
  if(!running) return;

  // hop animation
  if(player.moving){
    player.hopT += dt/0.13;
    if(player.hopT>=1){
      player.hopT=1; player.moving=false;
      player.x=player.tCol; player.y=player.tRow;
      landOnLane();
    } else {
      const t=player.hopT, e=1-(1-t)*(1-t);
      player.x=player.fromCol+(player.tCol-player.fromCol)*e;
      player.y=player.fromRow+(player.tRow-player.fromRow)*e;
    }
  }

  // ride log / drown
  const cur=getLane(player.row);
  if(!player.moving && cur.type===LANE.WATER){
    if(player.onLog){
      player.x += cur.speed*dt;
      player.col = player.x;
      if(player.x < -HALF-0.5 || player.x > HALF+0.5){ die('water'); }
    } else die('water');
  }

  // move traffic / logs
  for(const k in lanes){
    const lane=lanes[k];
    if(lane.type===LANE.ROAD||lane.type===LANE.WATER){
      for(const it of lane.items){
        it.x += lane.speed*dt;
        if(lane.speed>0 && it.x > HALF+5) it.x -= SPAN;
        if(lane.speed<0 && it.x < -HALF-5) it.x += SPAN;
        if(it.mesh) it.mesh.position.x = it.x*TILE;
      }
    } else if(lane.type===LANE.RAIL){
      updateRail(lane,dt);
    }
    if(lane.coins){ for(const co of lane.coins){ if(!co.taken) co.mesh.rotation.z += dt*2.5; } }
  }

  // collisions
  if(!player.moving){
    if(cur.type===LANE.ROAD && carHit(cur)) die('car');
    if(cur.type===LANE.RAIL && cur.train && trainHit(cur)) die('train');
  }

  // hop visual height + squash
  let lift=0, squash=1;
  if(player.moving){ lift=Math.sin(player.hopT*Math.PI)*TILE*0.45; squash=1+Math.sin(player.hopT*Math.PI)*0.12; }
  player.mesh.position.set(player.x*TILE, player.y*TILE, lift);
  player.mesh.scale.set(1,1,squash);
  player.mesh.rotation.z = dirAngle(player.dir);

  // score
  const reached=Math.max(0,Math.round(player.y));
  if(reached>furthest){ furthest=reached; score=furthest; scoreEl.textContent=score; }

  ensureLanes();
  updateCamera(dt);
}

function carHit(lane){
  for(const it of lane.items){
    if(Math.abs(player.col-it.x) < it.len/2+0.30) return true;
  }
  return false;
}
function trainHit(lane){
  const tr=lane.train;
  return Math.abs(player.col-tr.x) < tr.len/2+0.30;
}

function updateRail(lane,dt){
  if(lane.train){
    lane.train.x += lane.dir*lane.speed*dt;
    lane.train.mesh.position.x = lane.train.x*TILE;
    if(lane.dir>0 && lane.train.x > HALF+SPAN*0.6){ removeTrain(lane); }
    if(lane.dir<0 && lane.train.x < -HALF-SPAN*0.6){ removeTrain(lane); }
  } else {
    lane.timer-=dt;
    lane.warn = lane.timer<1.3 ? 1:0;
    if(lane._lamps){
      const on = lane.warn && (Math.floor(performance.now()/180)%2===0);
      for(const l of lane._lamps) l.material.color.setHex(on?0xff3333:0x550000);
    }
    if(lane.timer<=0){
      const len=6;
      const mesh=makeTrain(len);
      if(lane.dir<0) mesh.rotation.z=Math.PI;
      lane.group.add(mesh);
      lane.train={x: lane.dir>0? -HALF-len : HALF+len, len, mesh};
      lane.train.mesh.position.x=lane.train.x*TILE;
      lane.timer=rnd(3.5,6.5); lane.warn=0;
    }
  }
}
function removeTrain(lane){
  lane.group.remove(lane.train.mesh);
  disposeGroup(lane.train.mesh);
  lane.train=null;
}

function collectCoins(lane){
  if(!lane.coins) return;
  for(const co of lane.coins){
    if(!co.taken && Math.round(co.x)===Math.round(player.col)){
      co.taken=true;
      lane.group.remove(co.mesh);
      disposeGroup(co.mesh);
      coins++; coinsEl.textContent=coins;
    }
  }
}

function landOnLane(){
  const lane=getLane(player.row);
  collectCoins(lane);
  if(lane.type===LANE.WATER){
    player.onLog=null;
    for(const it of lane.items){
      if(Math.abs(player.col-it.x) < it.len/2+0.05){ player.onLog=it; break; }
    }
    if(!player.onLog) die('water');
  } else {
    player.onLog=null;
    if(lane.type===LANE.ROAD && carHit(lane)) die('car');
    if(lane.type===LANE.RAIL && lane.train && trainHit(lane)) die('train');
  }
}

function die(cause){
  if(gameOver) return;
  gameOver=true; running=false;
  if(cause==='water') player.mesh.position.z=-TILE*0.4;  // sink
  if(score>best){ best=score; localStorage.setItem('crossy3dBest',best); }
  bestEl.textContent='Best: '+best;
  setTimeout(()=>{
    finalEl.classList.remove('hidden');
    finalEl.innerHTML=`Score: <b>${score}</b><br>Best: ${best}`;
    overlay.querySelector('h1').textContent='💀 Game Over';
    overlay.querySelector('p').textContent = cause==='water'?'Platsch! Ins Wasser gefallen.'
      : cause==='train'?'Vom Zug erwischt!':'Vom Auto erwischt!';
    startBtn.textContent='Nochmal';
    overlay.classList.remove('hidden');
  },350);
}

// ---------- camera ----------
const camOffset = new THREE.Vector3(TILE*5.0, -TILE*7.0, TILE*8.5);
let camTargetY=0;
function updateCamera(dt){
  const py=player.y*TILE;
  camTargetY += (py - camTargetY)*Math.min(1,dt*5);
  camera.position.set(camOffset.x, camTargetY+camOffset.y, camOffset.z);
  camera.lookAt(0, camTargetY+TILE*1.5, 0);
  // light follows
  dirLight.position.set(player.x*TILE-150, camTargetY-220, 400);
  dirLight.target.position.set(player.x*TILE, camTargetY, 0);
}

// ---------- loop ----------
function loop(ts){
  const dt=Math.min(0.05,(ts-lastTime)/1000||0);
  lastTime=ts;
  if(running) update(dt);
  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}

// ---------- boot ----------
function boot(){
  buildRenderer();
  onResize();
  loadingEl.classList.add('hidden');
  overlay.classList.remove('hidden');
  // idle preview
  resetGame(); running=false;
  camTargetY=0; updateCamera(1);
  lastTime=performance.now();
  requestAnimationFrame(loop);
}

startBtn.addEventListener('click',()=>{
  overlay.classList.add('hidden');
  finalEl.classList.add('hidden');
  resetGame();
  camTargetY=0;
  lastTime=performance.now();
});

if(window.THREE){ boot(); }
else {
  // wait for script
  const iv=setInterval(()=>{ if(window.THREE){ clearInterval(iv); boot(); } },50);
  setTimeout(()=>{ if(!window.THREE){ loadingEl.textContent='Three.js konnte nicht geladen werden (Internet nötig).'; } },5000);
}
</script>
</body>
</html>
